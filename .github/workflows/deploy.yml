name: Deploy on approval

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Add deploying label
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --add-label "deploying-to-server"

      - name: Deploy (placeholder)
        run: |
          echo "Deploying ${{ github.event.pull_request.title }}..."
          echo "In production this copies files to IIS / starts the service on its port."
          echo "Deploy success."

      - name: Merge PR
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --merge \
            --delete-branch

      - name: On success - update labels
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --remove-label "approved" \
            --remove-label "deploying-to-server" \
            --remove-label "waiting-for-approval" \
            --add-label "successfully-deployed"

      - name: On failure - update labels
        if: failure()
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --remove-label "approved" \
            --remove-label "deploying-to-server" \
            --remove-label "waiting-for-approval" \
            --add-label "failed-to-deploy"
