name: Label PR on close

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Label as approved or rejected
        run: |
          pr="${{ github.event.pull_request.number }}"
          repo="${{ github.repository }}"
          if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            gh pr edit "$pr" --repo "$repo" --remove-label "waiting-for-approval" --add-label "approved"
          else
            gh pr edit "$pr" --repo "$repo" --remove-label "waiting-for-approval" --add-label "rejected"
          fi
